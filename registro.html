<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Parking The Beasts</title>
    <link rel="stylesheet" href="styles/registro.css">
    
</head>
<body>
    <div class="container">
        <!-- Sección del Logo -->
        <div class="logo-section">
            <img src="images/LogoInicio.png" alt="Parking The Beasts Logo">
        </div>

        <!-- Sección de Login -->
        <div class="login-box">
            <div class="title-inicio">
            <h2>Registro</h2>
            </div>
            <form>
                <input type="text" placeholder="Nombre" required>
                <input type="text" placeholder="Apellidos" required>
                <input type="email" placeholder="Correo" required>
                <input type="password" placeholder="Contraseña" required>
                <input type="text" placeholder="Cédula" required>
                <button type="submit">REGISTRARSE</button>
                <p>
                <a href="InicioSesion.html" class="register-link">Salir</a>
            </form>
        </div>
    </div>
</body>
</html>
