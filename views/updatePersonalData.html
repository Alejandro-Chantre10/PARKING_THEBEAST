<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../styles/updatePersonalData.css" />
    <link rel="stylesheet" href="../styles/sideBar.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  </head>

  <body>
    <div id="menu-container"></div>
    <div class="main-content">
      <div class="profile-container">
        <div class="profile-container">
            <label for="file-input" class="profile-label">
              <div class="profile-photo">
                <span>Agregar<br>foto<br>de perfil</span>
              </div>
              <div class="edit-icon">
                <i class="fas fa-pen"></i>
              </div>
            </label>
            <input type="file" id="file-input" style="display: none" />
          </div>
          

        <div class="form-container">
          <div class="form-group">
            <label>Nombres</label>
            <input id="current-password" type="text" />
          </div>

          <div class="form-group">
            <label>Apellidos</label>
            <input id="new-password" type="password" />
          </div>

          <div class="form-group">
            <label>Correo</label>
            <input id="confirm-password" type="password"/>
          </div>

          <div class="form-group">
            <label>Telefono</label>
            <input id="confirm-password" type="password" />
          </div>
          <div class="form-group">
            <label>Telefono</label>
            <input id="confirm-password" type="password" />
          </div>

          <button class="btn-save" type="button">Guardar</button>
        </div>
      </div>

      <script>
        function togglePassword(icon) {
          const input = icon.previousElementSibling;
          const isPassword = input.type === "password";

          input.type = isPassword ? "text" : "password";
          icon.src = isPassword
            ? "../images/ojo off.png"
            : "../images/ojos on.png";
          icon.alt = isPassword ? "Ocultar" : "Mostrar";
        }
      </script>
    </div>
    <script src="../js/sideBar.js"></script>
  </body>
</html>
