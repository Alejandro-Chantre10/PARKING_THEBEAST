<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="../styles/seeReservation.css" />
  <link rel="stylesheet" href="../styles/sideBar.css" />
  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #fff;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      width: 350px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
    }

    .warning-img {
      width: 50px;
      margin-bottom: 15px;
    }

    .modal-buttons {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }

    .btn-delete,
    .btn-cancel {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-delete {
      background-color: #5c6bc0;
      color: white;
    }

    .btn-cancel {
      background-color: #e0e0e0;
    }
  </style>
</head>

<body>
  <div id="menu-container"></div>
  <div class="main-content">
    <div class="update-reservation">
      <div class="update-header">
        <h2>Ver ReSeRvaS</h2>
        <button class="close-btn">X</button>
      </div>

      <table class="reservation-table">
        <thead>
          <tr>
            <th>Número</th>
            <th>Placa</th>
            <th>Hora Ingreso</th>
            <th>Fecha</th>
            <th>Vehículo</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>
          <tr data-id="001">
            <td>001</td>
            <td>ADS00G</td>
            <td>8:00 pm</td>
            <td>12/03/2025</td>
            <td>Carro</td>
            <td class="actions-cell">
              <button onclick="Reserva('descargar')" class="action-btn">
                <img src="../images/descarga-de-archivos.png" alt="descargar" class="icon-img" />
              </button>
              <button onclick="Reserva('editar')" class="action-btn">
                <img src="../images/editar.png" alt="Editar" class="icon-img" />
              </button>
              <button onclick="showDeleteModal('001', this)" class="action-btn">
                <img src="../images/eliminar.png" alt="Eliminar" class="icon-img" />
              </button>
            </td>
          </tr>
          <tr data-id="002">
            <td>002</td>
            <td>MWS34D</td>
            <td>8:00 pm</td>
            <td>12/03/2025</td>
            <td>Moto</td>
            <td class="actions-cell">
              <button class="action-btn">
                <img src="../images/descarga-de-archivos.png" alt="descargar" class="icon-img" />
              </button>
              <button class="action-btn">
                <img src="../images/editar.png" alt="Editar" class="icon-img" />
              </button>
              <button class="action-btn" onclick="showDeleteModal('002', this)">
                <img src="../images/eliminar.png" alt="Eliminar" class="icon-img" />
              </button>
            </td>
          </tr>
          <!-- Fila vacía decorativa -->
          <tr><td colspan="6">&nbsp;</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal de Confirmación -->
  <div id="deleteModal" class="modal">
    <div class="modal-content">
      <img src="../images/advertencia-de-triangulo.png" alt="Advertencia" class="warning-img" />
      <p id="modalText">¿Estás seguro de eliminar la reserva?</p>
      <div class="modal-buttons">
        <button class="btn-delete" onclick="confirmDelete()">Eliminar</button>
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="../js/sideBar.js"></script>
  <script src="../js/reserva.js"></script>

  <script>
    let rowToDelete = null;

    function showDeleteModal(id, button) {
      // Guardar la fila asociada al botón presionado
      rowToDelete = button.closest("tr");
      document.getElementById("deleteModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("deleteModal").style.display = "none";
      rowToDelete = null;
    }

    function confirmDelete() {
      if (rowToDelete) {
        rowToDelete.remove();
        // Puedes hacer una llamada AJAX o redirección a PHP aquí si es necesario
        console.log("Reserva eliminada.");
      }
      closeModal();
    }
  </script>
</body>

</html>
