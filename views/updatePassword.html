<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../styles/updatePassword.css">
  <link rel="stylesheet" href="../styles/sideBar.css">
</head>

<body>
  <div id="menu-container"></div>
  <div class="main-content">
    <div class="profile-container">
      <div class="profile-image-wrapper">
        <img src="../images/ICONO USUARIO.png" alt="Imagen de perfil" class="profile-image">
      </div>
      <div class="profile-name">NOMBRE APELLIDO</div>
      <div class="profile-email">CORREO</div>

      <div class="form-container">
        <div class="form-group">
          <label for="current-password">Contraseña actual</label>
          <input id="current-password" type="text" placeholder="">
        </div>

        <div class="form-group">
          <label for="new-password">Contraseña nueva</label>
          <input id="new-password" type="password" placeholder="">
          <img src="../images/ojos on.png" alt="Mostrar" class="eye-icon" onclick="togglePassword(this)">
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirmar contraseña</label>
          <input id="confirm-password" type="password" placeholder="">
          <img src="../images/ojos on.png" alt="Ocultar" class="eye-icon" onclick="togglePassword(this)">
        </div>
        <button class="btn-save" type="button">Guardar cambios</button>
      </div>
    </div>

    <script>
      function togglePassword(icon) {
        const input = icon.previousElementSibling;
        const isPassword = input.type === "password";

        input.type = isPassword ? "text" : "password";
        icon.src = isPassword ? "../images/ojo off.png" : "../images/ojos on.png";
        icon.alt = isPassword ? "Ocultar" : "Mostrar";
      }
    </script>
  </div>
  <script src="../js/sideBar.js"></script>
</body>

</html>
